<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🫧 Scoppia le Bolle!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --sky: #b3eaff;
      --sky2: #e8f8ff;
    }

    body {
      font-family: 'Baloo 2', cursive;
      background: linear-gradient(180deg, var(--sky) 0%, var(--sky2) 100%);
      min-height: 100vh;
      overflow: hidden;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Animated clouds */
    .cloud {
      position: fixed;
      background: white;
      border-radius: 50px;
      opacity: 0.75;
      pointer-events: none;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }

    .cloud.c1 {
      width: 120px;
      height: 40px;
      top: 8%;
      left: -130px;
      animation: floatCloud 22s linear infinite;
    }

    .cloud.c1::before {
      width: 60px;
      height: 60px;
      top: -30px;
      left: 15px;
    }

    .cloud.c1::after {
      width: 40px;
      height: 40px;
      top: -20px;
      left: 55px;
    }

    .cloud.c2 {
      width: 90px;
      height: 30px;
      top: 20%;
      left: -100px;
      animation: floatCloud 30s linear infinite 8s;
      opacity: 0.55;
    }

    .cloud.c2::before {
      width: 45px;
      height: 45px;
      top: -22px;
      left: 10px;
    }

    .cloud.c2::after {
      width: 30px;
      height: 30px;
      top: -14px;
      left: 42px;
    }

    .cloud.c3 {
      width: 150px;
      height: 45px;
      top: 5%;
      left: -170px;
      animation: floatCloud 38s linear infinite 15s;
    }

    .cloud.c3::before {
      width: 70px;
      height: 70px;
      top: -38px;
      left: 20px;
    }

    .cloud.c3::after {
      width: 55px;
      height: 55px;
      top: -28px;
      left: 70px;
    }

    @keyframes floatCloud {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(calc(100vw + 200px));
      }
    }

    /* Score bar */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(6px);
      z-index: 50;
      border-bottom: 3px solid rgba(255, 255, 255, 0.8);
    }

    #topbar .score-pill {
      background: #ff6fb7;
      color: white;
      font-size: clamp(18px, 5vw, 28px);
      padding: 6px 22px;
      border-radius: 50px;
      box-shadow: 0 4px 0 #d44092;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #topbar .level-pill {
      background: #7ed6df;
      color: white;
      font-size: clamp(14px, 4vw, 22px);
      padding: 6px 18px;
      border-radius: 50px;
      box-shadow: 0 4px 0 #48b5c0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      animation: rise linear forwards;
      box-shadow:
        inset -8px -8px 20px rgba(255, 255, 255, 0.55),
        inset 6px 6px 14px rgba(255, 255, 255, 0.8),
        0 2px 10px rgba(0, 0, 0, 0.08);
      transition: transform 0.06s;
      will-change: transform;
    }

    .bubble:active {
      transform: scale(0.85);
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) scale(0.9);
        opacity: 0;
      }
    }

    /* Pop burst */
    .pop-burst {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      animation: burst 0.45s ease-out forwards;
    }

    @keyframes burst {
      0% {
        transform: scale(0.3);
        opacity: 1;
      }

      60% {
        transform: scale(1.5);
        opacity: 0.9;
      }

      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    /* Score popup */
    .score-popup {
      position: fixed;
      pointer-events: none;
      font-size: clamp(24px, 6vw, 42px);
      font-weight: 800;
      color: #ff6fb7;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.12);
      z-index: 300;
      animation: popUp 0.9s ease-out forwards;
    }

    @keyframes popUp {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 1;
      }

      60% {
        transform: translateY(-60px) scale(1.15);
        opacity: 1;
      }

      100% {
        transform: translateY(-110px) scale(1);
        opacity: 0;
      }
    }

    /* Confetti pieces */
    .confetto {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 250;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(-20px) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translateY(80px) rotate(360deg);
      }
    }

    /* Custom cursor */
    #cursor {
      position: fixed;
      width: 46px;
      height: 46px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      font-size: 36px;
      text-align: center;
      line-height: 46px;
      transition: transform 0.05s;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }

    /* Level-up banner */
    #levelBanner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #ff6fb7, #ffb347);
      color: white;
      font-size: clamp(28px, 8vw, 52px);
      padding: 20px 40px;
      border-radius: 30px;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.15), 0 0 40px rgba(255, 111, 183, 0.5);
      z-index: 500;
      text-align: center;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #levelBanner.show {
      transform: translate(-50%, -50%) scale(1);
    }

    /* Grass floor */
    #grass {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(180deg, #6bcb77, #4caa59);
      border-radius: 60% 60% 0 0 / 20px 20px 0 0;
      z-index: 10;
      pointer-events: none;
    }

    #grass::before {
      content: '🌸🌼🌻🌷🌸🌼🌻🌷🌸🌼🌻🌷🌸🌼';
      position: absolute;
      top: -16px;
      left: 0;
      right: 0;
      font-size: 22px;
      letter-spacing: 4px;
      text-align: center;
      pointer-events: none;
    }

    /* Rainbow sun */
    #sun {
      position: fixed;
      top: 70px;
      right: 40px;
      font-size: 64px;
      animation: sunSpin 8s linear infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 14px rgba(255, 215, 0, 0.6));
    }

    @keyframes sunSpin {
      0% {
        transform: rotate(0deg) scale(1);
      }

      50% {
        transform: rotate(180deg) scale(1.08);
      }

      100% {
        transform: rotate(360deg) scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <div id="topbar">
    <div class="score-pill">⭐ <span id="scoreEl">0</span></div>
    <div class="level-pill">🎈 Livello <span id="levelEl">1</span></div>
  </div>

  <div id="sun">☀️</div>
  <div id="grass"></div>
  <div id="cursor">👆</div>
  <div id="levelBanner">🎉 Bravissima! 🎉<br>Livello <span id="bannerLevel">2</span>!</div>

  <!-- Schermata iniziale -->
  <div id="startScreen" style="
  position:fixed;inset:0;z-index:9000;
  background:linear-gradient(160deg,#ffe0f0,#c8f0ff,#d8ffd8);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
">
    <div style="font-size:clamp(40px,14vw,90px);text-align:center;">🫧🎈🫧</div>
    <div style="
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(24px,7vw,52px);color:#ff6fb7;
    text-align:center;line-height:1.3;
    text-shadow:0 3px 0 rgba(255,111,183,0.25);
  ">Ciao Nora!<br>Scoppia le bolle! 🎀</div>
    <button id="startBtn" style="
    font-family:'Baloo 2',cursive;font-weight:800;
    font-size:clamp(26px,8vw,58px);
    background:linear-gradient(135deg,#ff6fb7,#ff922b);
    color:white;border:none;border-radius:999px;
    padding:clamp(14px,4vw,26px) clamp(44px,10vw,84px);
    box-shadow:0 8px 0 #c94a88,0 0 40px rgba(255,111,183,0.35);
    cursor:pointer;
  ">▶ GIOCA!</button>
  </div>

  <script>
    // ── CONFIG ──────────────────────────────────────────────
    const EMOJIS = ['🐸', '🦋', '⭐', '🍭', '🌈', '🐠', '🐝', '🍓', '🎀', '🐙', '🌸', '🐻'];
    const COLORS = [
      'rgba(255,111,183,0.55)', 'rgba(130,210,255,0.55)',
      'rgba(255,200,80,0.55)', 'rgba(140,230,140,0.55)',
      'rgba(200,150,255,0.55)', 'rgba(255,160,100,0.55)',
      'rgba(100,220,220,0.55)', 'rgba(255,100,100,0.55)',
    ];
    const CONFETTI_COLORS = ['#ff6fb7', '#ffd93d', '#6bcb77', '#4d96ff', '#ff922b', '#cc5de8'];

    let score = 0;
    let level = 1;
    let bubblesPopped = 0;
    let spawnInterval = 1400;
    let maxBubbles = 6;
    let spawnTimer = null;
    let activeBubbles = 0;

    // ── AUDIO ───────────────────────────────────────────────
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playPopSound() {
      try {
        const ctx = getAudioCtx();
        // Bubble pop: short descending tone + noise burst
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(520, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.18);
        gain.gain.setValueAtTime(0.55, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.22);

        // Extra "pop" click
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const g2 = ctx.createGain();
        g2.gain.setValueAtTime(0.18, ctx.currentTime);
        src.connect(g2); g2.connect(ctx.destination);
        src.start(ctx.currentTime);
      } catch (e) { }
    }

    function playLevelSound() {
      try {
        const ctx = getAudioCtx();
        const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.13;
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.4, t + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          osc.start(t); osc.stop(t + 0.35);
        });
      } catch (e) { }
    }

    // ── SPEECH (voce) ────────────────────────────────────────
    const FRASI_POP = [
      'Bravissima Nora!',
      'Continua così! Nori Nori',
      'Nori Nori di Papa',
      'Bravissima Nora!',
      'Che brava che sei Nora!',
      'Bravissima Nora, brava!',
      'Ottima Nora!',
      'Bravissima Nora!',
    ];
    const FRASI_LEVEL = [
      'Bravissima Nora, nuovo livello!',
      'Bravissima Nora, sei fantastica!',
      'Bravissima Nora, sei una campionessa!',
      'Bravissima Nora, continua così!',
    ];

    let lastSpeech = 0;
    let popCount = 0;

    function speak(text) {
      if (!window.speechSynthesis) return;
      // don't overlap too much
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'it-IT';
      utter.rate = 0.78;
      utter.pitch = 1.3;
      utter.volume = 1;
      window.speechSynthesis.speak(utter);
    }

    function maybeSpeakPop() {
      popCount++;
      // Parla ogni 2 bolle per non sovrapporsi al suono
      if (popCount % 2 === 0) {
        const frase = FRASI_POP[Math.floor(Math.random() * FRASI_POP.length)];
        speak(frase);
      }
    }

    // ── CURSOR ──────────────────────────────────────────────
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      cursor.style.left = t.clientX + 'px';
      cursor.style.top = t.clientY + 'px';
    }, { passive: true });

    // Sblocca audio al primo tocco/click e dai il benvenuto
    let welcomed = false;
    function welcome() {
      if (welcomed) return;
      welcomed = true;
      getAudioCtx(); // sblocca AudioContext
      setTimeout(() => speak('Ciao Nora! Scoppia tutte le bolle!'), 300);
    }
    document.addEventListener('click', welcome, { once: true });
    document.addEventListener('touchstart', welcome, { once: true });

    // ── SPAWN BUBBLE ────────────────────────────────────────
    function spawnBubble() {
      if (activeBubbles >= maxBubbles) return;
      activeBubbles++;

      const size = 80 + Math.random() * 80; // 80–160 px
      const x = size / 2 + Math.random() * (window.innerWidth - size);
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      const dur = 5 + Math.random() * 6; // 5–11 s

      const el = document.createElement('div');
      el.className = 'bubble';
      el.style.cssText = `
    width:${size}px; height:${size}px;
    left:${x}px; bottom:-${size}px;
    background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.9), ${color});
    animation-duration: ${dur}s;
    font-size: ${size * 0.38}px;
    z-index: 30;
  `;
      el.textContent = emoji;

      // Wobble side-to-side
      const wobble = (Math.random() - 0.5) * 80;
      el.style.setProperty('--wobble', wobble + 'px');

      // POP on click/touch
      function pop(e) {
        e.stopPropagation();
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        doPop(cx, cy, color, emoji, size);
        el.remove();
        activeBubbles--;
      }

      el.addEventListener('click', pop, { once: true });
      el.addEventListener('touchstart', pop, { once: true, passive: false });

      // Auto-remove when animation ends
      el.addEventListener('animationend', () => {
        if (el.parentNode) { el.remove(); activeBubbles--; }
      });

      document.body.appendChild(el);
    }

    // ── POP EFFECT ──────────────────────────────────────────
    function doPop(cx, cy, color, emoji, size) {
      // Score
      score += 1;
      bubblesPopped += 1;
      document.getElementById('scoreEl').textContent = score;

      // Suono pop
      playPopSound();
      // Voce "Bravissima Nora" ogni 3 bolle
      maybeSpeakPop();

      // Score popup
      const popup = document.createElement('div');
      popup.className = 'score-popup';
      popup.textContent = '+1 ⭐';
      popup.style.left = (cx - 30) + 'px';
      popup.style.top = (cy - 20) + 'px';
      document.body.appendChild(popup);
      popup.addEventListener('animationend', () => popup.remove());

      // Burst ring
      const burst = document.createElement('div');
      burst.className = 'pop-burst';
      burst.style.cssText = `
    left:${cx - size / 2}px; top:${cy - size / 2}px;
    width:${size}px; height:${size}px;
    border-radius:50%;
    border: 6px solid ${color.replace('0.55', '1')};
  `;
      document.body.appendChild(burst);
      burst.addEventListener('animationend', () => burst.remove());

      // Confetti
      for (let i = 0; i < 10; i++) {
        launchConfetto(cx, cy);
      }

      // Emoji particles
      for (let i = 0; i < 4; i++) {
        const ep = document.createElement('div');
        ep.style.cssText = `
      position:fixed; pointer-events:none; z-index:300;
      font-size:${18 + Math.random() * 14}px;
      left:${cx}px; top:${cy}px;
      animation: confettiFall ${0.5 + Math.random() * 0.5}s ease-out forwards;
    `;
        ep.textContent = emoji;
        const dx = (Math.random() - 0.5) * 120, dy = -40 - Math.random() * 60;
        ep.style.transform = `translate(${dx}px, ${dy}px)`;
        document.body.appendChild(ep);
        ep.addEventListener('animationend', () => ep.remove());
      }

      // Check level up
      if (bubblesPopped % 10 === 0) levelUp();
    }

    function launchConfetto(cx, cy) {
      const el = document.createElement('div');
      el.className = 'confetto';
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 20;
      el.style.cssText = `
    left:${cx}px; top:${cy}px;
    background: ${CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)]};
    transform: translate(${tx}px, ${ty}px);
    animation-duration: ${0.4 + Math.random() * 0.4}s;
    border-radius: ${Math.random() > 0.5 ? '50%' : '3px'};
    width:${6 + Math.random() * 8}px; height:${6 + Math.random() * 8}px;
  `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ── LEVEL UP ────────────────────────────────────────────
    function levelUp() {
      level++;
      document.getElementById('levelEl').textContent = level;
      document.getElementById('bannerLevel').textContent = level;

      // Suono vittoria + voce
      playLevelSound();
      setTimeout(() => {
        const frase = FRASI_LEVEL[Math.floor(Math.random() * FRASI_LEVEL.length)];
        speak(frase);
      }, 400);

      // Show banner
      const banner = document.getElementById('levelBanner');
      banner.classList.add('show');
      setTimeout(() => banner.classList.remove('show'), 2200);

      // Make it harder / more fun
      spawnInterval = Math.max(500, spawnInterval - 120);
      maxBubbles = Math.min(14, maxBubbles + 1);
      restartSpawn();

      // Big confetti shower
      for (let i = 0; i < 40; i++) {
        setTimeout(() => {
          launchConfetto(
            Math.random() * window.innerWidth,
            Math.random() * window.innerHeight * 0.6
          );
        }, i * 40);
      }
    }

    // ── SPAWN LOOP ──────────────────────────────────────────
    function restartSpawn() {
      clearInterval(spawnTimer);
      spawnTimer = setInterval(spawnBubble, spawnInterval);
    }

    // ── START BUTTON ─────────────────────────────────────────
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('startBtn').addEventListener('touchstart', startGame, { passive: true });

    function startGame() {
      const screen = document.getElementById('startScreen');
      screen.style.transition = 'opacity 0.5s';
      screen.style.opacity = '0';
      setTimeout(() => screen.remove(), 500);

      // Sblocca AudioContext (richiede gesto utente)
      getAudioCtx();

      // Aspetta un tick poi parla — il gesto è appena avvenuto
      setTimeout(() => {
        speak('Ciao Nora! Scoppia tutte le bolle!');
      }, 200);

      // Avvia il gioco
      for (let i = 0; i < 4; i++) {
        setTimeout(spawnBubble, i * 350);
      }
      restartSpawn();
    }
  </script>
</body>

</html>
